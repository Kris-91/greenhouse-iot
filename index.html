<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GreenHouse IoT — 智能温室物联网监控平台</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 36 36'%3E%3Ctext y='32' font-size='32'%3E%F0%9F%AA%A1%3C/text%3E%3C/svg%3E">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.min.css">
</head>
<body>
<div class="app-header">
  <div class="app-title"><span class="logo-icon">🌱</span> GreenHouse IoT</div>
  <div class="header-info">
    <span class="clock" id="clock">--:--:--</span>
    <span class="alert-badge" id="alertBadge">🔔<span class="badge-num" id="badgeNum">0</span></span>
  </div>
</div>
<nav class="tab-bar">
  <button class="tab-btn active" data-tab="dashboard">🌿 温室总览</button>
  <button class="tab-btn" data-tab="monitor">📊 数据分析</button>
  <button class="tab-btn" data-tab="control">⚙️ 设备控制</button>
  <button class="tab-btn" data-tab="alert">🔔 告警中心</button>
</nav>
<main class="tab-content">
  <section id="tab-dashboard" class="tab-pane active">
    <div class="summary-cards" id="summaryCards">
      <div class="summary-card"><span class="sum-icon">🌡️</span><span class="sum-label">温室均温</span><span class="sum-value" id="avgTemp">--</span><span class="sum-unit">°C</span></div>
      <div class="summary-card"><span class="sum-icon">💧</span><span class="sum-label">平均湿度</span><span class="sum-value" id="avgHumidity">--</span><span class="sum-unit">%</span></div>
      <div class="summary-card"><span class="sum-icon">✅</span><span class="sum-label">设备正常</span><span class="sum-value" id="deviceOnline">--</span><span class="sum-unit">/9</span></div>
      <div class="summary-card"><span class="sum-icon">🔔</span><span class="sum-label">活跃告警</span><span class="sum-value" id="activeAlerts">0</span><span class="sum-unit">条</span></div>
    </div>
    <div class="room-grid" id="roomGrid"></div>
    <div class="mini-alerts"><h3>📋 最新告警</h3><div id="miniAlertList"><p class="empty-hint">暂无告警</p></div></div>
  </section>
  <section id="tab-monitor" class="tab-pane">
    <div class="monitor-controls">
      <div class="mc-group"><label>区域:</label><div class="mc-options" id="roomOptionsMonitor"></div></div>
      <div class="mc-group"><label>指标:</label><div class="mc-options" id="sensorOptionsMonitor"></div></div>
      <div class="mc-group"><label>显示:</label><div class="mc-options" id="rangeOptionsMonitor"></div></div>
    </div>
    <div class="chart-container"><canvas id="sensorChart"></canvas></div>
    <p class="chart-fallback" id="chartFallback">图表加载失败，请检查网络连接</p>
  </section>
  <section id="tab-control" class="tab-pane">
    <div class="master-bar" id="masterBar">
      <span class="master-title">温室总控</span>
      <button class="btn-scene" data-scene="day">☀️ 日间模式</button>
      <button class="btn-scene" data-scene="night">🌙 夜间模式</button>
      <button class="btn-scene" data-scene="rain">🌧️ 雨天模式</button>
      <button class="btn-all-on">🔛 全部开启</button>
      <button class="btn-all-off">🔴 全部关闭</button>
    </div>
    <div class="control-grid" id="controlGrid"></div>
  </section>
  <section id="tab-alert" class="tab-pane">
    <div class="thresholds" id="thresholds"><h3>⚙️ 告警阈值配置</h3></div>
    <div class="alert-history"><h3>📋 告警历史</h3>
      <div class="alert-toolbar"><div class="alert-filters" id="alertFilters"></div>
        <label class="sound-toggle">🔊 声音 <input type="checkbox" id="soundToggle" checked></label>
        <button id="clearAlerts">清除记录</button>
      </div>
      <table><thead><tr><th>时间</th><th>区域</th><th>类型</th><th>数值</th><th>阈值</th></tr></thead><tbody id="alertTableBody"><tr><td colspan="5" class="empty-hint">暂无告警记录</td></tr></tbody></table>
    </div>
  </section>
</main>
<footer class="app-footer">GreenHouse IoT v1.0 — 智能温室物联网模拟监控平台<br>数据每2秒刷新 | 模拟传感器数据 | 面向物联网工程课程设计</footer>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="js/zones.js"></script>
<script src="js/simulator.js"></script>
<script src="js/store.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/monitor.js"></script>
<script src="js/control.js"></script>
<script src="js/alert.js"></script>
<script src="js/app.js"></script>
</body>
</html>
